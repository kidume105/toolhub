<!doctype html><html lang="sw"><head>
  <meta charset="utf-8"/>
  <title>Image Compressor — QuickTools</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content="Compress JPG/PNG/WebP client‑side na resize options."/>
  <meta name="theme-color" content="#08111f"/>
  <link rel="canonical" href="/tools/img-compress.html"/>
  <meta property="og:title" content="Image Compressor — QuickTools"/>
  <meta property="og:description" content="Compress JPG/PNG/WebP client‑side na resize options."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="/tools/img-compress.html"/>

  <meta name="robots" content="index,follow"/>
<link rel="stylesheet" href="/assets/app.css"/></head><body>
<div class="container"><div id="navMount"></div>
<section class="page">
<div class="breadcrumb"><a href="/index.html">Tools</a> / <span>Image Compressor</span></div>
<h1 style="margin:10px 0 6px">Image Compressor</h1>
<p class="sub">Compress JPG/PNG/WebP client‑side na resize options.</p>
<label class="label">Choose image</label><input id="file" type="file" accept="image/*"/>
<div class="row2"><div><label class="label">Quality</label><input id="q" type="number" min="10" max="95" value="75"/></div><div><label class="label">Max width</label><input id="w" type="number" min="200" max="4000" value="1600"/></div></div>
<div class="btns"><button id="go" disabled>Compress</button><button id="dl" class="secondary" disabled>Download</button><button id="clr" class="ghost">Clear</button></div>
<div class="row2"><div class="panel"><div class="label">Original</div><div id="origInfo" class="small">—</div><img id="origImg" class="media-preview"/></div><div class="panel"><div class="label">Compressed</div><div id="newInfo" class="small">—</div><img id="newImg" class="media-preview"/></div></div><p id="msg" class="note" style="margin-top:12px"></p>
</section><div id="footerMount"></div></div>
<div id="toast" class="toast"></div>
<script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>
const file=document.getElementById('file'),q=document.getElementById('q'),w=document.getElementById('w'),go=document.getElementById('go'),dl=document.getElementById('dl'),clr=document.getElementById('clr'),msg=document.getElementById('msg'),origImg=document.getElementById('origImg'),newImg=document.getElementById('newImg'),origInfo=document.getElementById('origInfo'),newInfo=document.getElementById('newInfo'); let original=null,outBlob=null;
const bytes=n=>n<1024?n+' B':n<1048576?(n/1024).toFixed(1)+' KB':(n/1048576).toFixed(2)+' MB';
file.onchange=()=>{const f=file.files?.[0]; original=f||null; outBlob=null; dl.disabled=true; go.disabled=!f; if(!f) return; origInfo.textContent=`${f.type} • ${bytes(f.size)}`; origImg.src=URL.createObjectURL(f); origImg.style.display='block'; newImg.style.display='none'; newInfo.textContent='—'; msg.textContent='';};
go.onclick=async()=>{if(!original) return; msg.textContent='Compressing...'; const img=new Image(); img.src=URL.createObjectURL(original); await new Promise((res,rej)=>{img.onload=res; img.onerror=rej;}); const maxW=Math.max(200,Math.min(4000,+w.value||1600)), qual=Math.max(.1,Math.min(.95,(+q.value||75)/100)); const scale=Math.min(1,maxW/img.width), cw=Math.round(img.width*scale), ch=Math.round(img.height*scale); const c=document.createElement('canvas'); c.width=cw;c.height=ch; c.getContext('2d').drawImage(img,0,0,cw,ch); outBlob=await new Promise(r=>c.toBlob(r,'image/webp',qual)); if(!outBlob) outBlob=await new Promise(r=>c.toBlob(r,'image/jpeg',qual)); newImg.src=URL.createObjectURL(outBlob); newImg.style.display='block'; newInfo.textContent=`${outBlob.type} • ${bytes(outBlob.size)} • ${cw}x${ch}`; dl.disabled=false; msg.textContent='✅ Done';};
dl.onclick=()=>{if(!outBlob) return; const a=document.createElement('a'); a.href=URL.createObjectURL(outBlob); a.download='compressed.'+(outBlob.type.includes('webp')?'webp':'jpg'); a.click();};
clr.onclick=()=>{file.value=''; original=null; outBlob=null; go.disabled=true; dl.disabled=true; origImg.style.display='none'; newImg.style.display='none'; origInfo.textContent='—'; newInfo.textContent='—'; msg.textContent='';};
</script>
</body></html>
