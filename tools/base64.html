<div class="container"><div id="navMount"></div>
<section class="page">
<div class="breadcrumb"><a href="/index.html">Tools</a> / <span>Base64 Encode/Decode</span></div>
<h1 style="margin:10px 0 6px">Base64 Encode/Decode</h1>
<p class="sub">Encode/Decode UTF‑8 text.</p>
<div class="row2"><div><label class="label">Input</label><textarea id="in" rows="10"></textarea></div><div><label class="label">Output</label><textarea id="out" rows="10" readonly></textarea></div></div>
<div class="btns"><button id="enc">Encode</button><button id="dec" class="secondary">Decode</button><button id="copy" class="ghost">Copy output</button><button id="clr" class="ghost">Clear</button></div><p id="msg" class="note"></p>
</section><div id="footerMount"></div></div>
<div id="toast" class="toast"></div>
<script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>
const i=document.getElementById('in'),o=document.getElementById('out'),m=document.getElementById('msg');
const utf8ToB64=str=>btoa(unescape(encodeURIComponent(str))); const b64ToUtf8=b64=>decodeURIComponent(escape(atob(b64)));
document.getElementById('enc').onclick=()=>{try{o.value=utf8ToB64(i.value||'');m.textContent='✅ Encoded';}catch(e){m.textContent='⚠️ Error';}};
document.getElementById('dec').onclick=()=>{try{o.value=b64ToUtf8((i.value||'').trim());m.textContent='✅ Decoded';}catch(e){m.textContent='⚠️ Base64 invalid';}};
document.getElementById('copy').onclick=()=>copyText(o.value); document.getElementById('clr').onclick=()=>{i.value='';o.value='';m.textContent='';};
</script>
</body></html>
