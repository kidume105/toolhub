<link rel="stylesheet" href="/assets/app.css"/></head><body><div class="container"><div id="navMount"></div><section class="page"><div class="breadcrumb"><a href="/index.html">Home</a><span>/</span><span>Audio Converter</span></div><h1>Audio Converter</h1><p class="sub">Convert audio/video kwenda MP3, M4A au WAV na chagua bitrate.</p><div class="panel"><p class="note"><b>Tip:</b> Hii tool inaweza kubadilisha audio au kutoa music kutoka video. Inaonyesha loading state na progress.</p></div><label class="label">Choose audio or video file</label><input id="file" type="file" accept="audio/*,video/*"/><div class="row2"><div><label class="label">Output format</label><select id="format"><option value="mp3" selected>MP3</option><option value="m4a">M4A (AAC)</option><option value="wav">WAV</option></select></div><div><label class="label">Bitrate</label><select id="br"><option>96k</option><option selected>128k</option><option>192k</option><option>256k</option></select></div></div><div class="btns"><button id="load">Load engine</button><button id="run" class="secondary" disabled>Convert</button><button id="download" class="ghost" disabled>Download</button></div><div class="panel"><div class="progress"><div id="bar"></div></div><p id="status" class="note" style="margin-top:10px;">Ready.</p><p id="sizes" class="small"></p></div><audio id="preview" class="preview hidden" controls></audio></section><div id="footerMount"></div></div><div id="toast" class="toast"></div><script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script type="module">import { createFFmpeg, fetchFile } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js";const ffmpeg=createFFmpeg({log:true,corePath:"https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js"});const fileEl=document.getElementById("file"),loadBtn=document.getElementById("load"),runBtn=document.getElementById("run"),dlBtn=document.getElementById("download"),status=document.getElementById("status"),bar=document.getElementById("bar"),sizes=document.getElementById("sizes"),preview=document.getElementById("preview"),formatEl=document.getElementById("format"),brEl=document.getElementById("br");let loaded=false,outBlob=null;function setBar(r){bar.style.width=Math.max(0,Math.min(100,Math.round(r*100)))+"%"}function bytes(n){if(n<1024)return n+" B";if(n<1024*1024)return (n/1024).toFixed(1)+" KB";return (n/1024/1024).toFixed(2)+" MB"}loadBtn.onclick=async()=>{if(loaded)return toast("✅ Engine already loaded");status.innerHTML='<span class="loading"><span class="spinner"></span> Inaload audio engine...</span>';setBar(.14);ffmpeg.setProgress(({ratio})=>setBar(ratio));try{await ffmpeg.load();loaded=true;runBtn.disabled=!fileEl.files?.[0];setBar(1);status.textContent="✅ Engine loaded.";toast("✅ Ready")}catch{setBar(0);status.textContent="⚠️ Failed to load engine."}};fileEl.onchange=()=>{const f=fileEl.files?.[0];outBlob=null;dlBtn.disabled=true;preview.classList.add("hidden");sizes.textContent=f?`Original: ${bytes(f.size)}`:"";if(loaded)runBtn.disabled=!f};runBtn.onclick=async()=>{const f=fileEl.files?.[0];if(!loaded)return toast("Load engine kwanza");if(!f)return toast("Chagua file");status.innerHTML='<span class="loading"><span class="spinner"></span> Inaconvert audio...</span>';setBar(.04);const inExt=(f.name.split(".").pop()||"mp4").toLowerCase(),input=`input.${inExt}`,ext=formatEl.value,output=`output.${ext}`;ffmpeg.FS("writeFile",input,await fetchFile(f));const args=["-i",input,"-vn"];if(ext==="mp3")args.push("-codec:a","libmp3lame","-b:a",brEl.value,output);else if(ext==="m4a")args.push("-codec:a","aac","-b:a",brEl.value,output);else args.push("-codec:a","pcm_s16le",output);try{await ffmpeg.run(...args);const data=ffmpeg.FS("readFile",output);const mime=ext==="mp3"?"audio/mpeg":(ext==="m4a"?"audio/mp4":"audio/wav");outBlob=new Blob([data.buffer],{type:mime});sizes.textContent=`Original: ${bytes(f.size)} → Output: ${bytes(outBlob.size)}`;status.textContent="✅ Audio ready.";dlBtn.disabled=false;setBar(1);toast("✅ Done");preview.src=URL.createObjectURL(outBlob);preview.classList.remove("hidden");try{ffmpeg.FS("unlink",input);ffmpeg.FS("unlink",output)}catch{}}catch{status.textContent="⚠️ Conversion error. Jaribu file ndogo.";toast("⚠️ Error")}};dlBtn.onclick=()=>{if(!outBlob)return;const a=document.createElement("a");a.href=URL.createObjectURL(outBlob);a.download=`audio.${formatEl.value}`;document.body.appendChild(a);a.click();a.remove()};</script></body></html>
