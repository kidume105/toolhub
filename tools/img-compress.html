<link rel="stylesheet" href="/assets/app.css"/></head><body><div class="container"><div id="navMount"></div><section class="page"><div class="breadcrumb"><a href="/index.html">Home</a><span>/</span><span>Image Compressor</span></div><h1>Image Compressor</h1><p class="sub">Compress JPG/PNG images na preview ya before/after.</p><label class="label">Choose image</label><input id="file" type="file" accept="image/*"/><div class="row2"><div><label class="label">Quality</label><input id="q" type="number" min="10" max="95" value="75"/></div><div><label class="label">Max width</label><input id="w" type="number" min="200" max="4000" value="1600"/></div></div><div class="btns"><button id="go" disabled>Compress</button><button id="download" class="secondary" disabled>Download</button><button id="clr" class="ghost">Clear</button></div><div class="panel"><div class="progress"><div id="bar"></div></div><p id="msg" class="note" style="margin-top:10px;">Ready.</p><p id="sizes" class="small"></p></div><div class="row2"><div class="panel"><div class="label">Original</div><div id="origInfo" class="small">—</div><img id="origImg" class="preview hidden"/></div><div class="panel"><div class="label">Compressed</div><div id="newInfo" class="small">—</div><img id="newImg" class="preview hidden"/></div></div></section><div id="footerMount"></div></div><div id="toast" class="toast"></div><script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>const fileInput=document.getElementById("file"),q=document.getElementById("q"),w=document.getElementById("w"),go=document.getElementById("go"),dl=document.getElementById("download"),clr=document.getElementById("clr"),msg=document.getElementById("msg"),bar=document.getElementById("bar"),sizes=document.getElementById("sizes"),origImg=document.getElementById("origImg"),newImg=document.getElementById("newImg"),origInfo=document.getElementById("origInfo"),newInfo=document.getElementById("newInfo");let originalFile=null,outBlob=null;function bytes(n){if(n<1024)return n+" B";if(n<1024*1024)return (n/1024).toFixed(1)+" KB";return (n/1024/1024).toFixed(2)+" MB"}fileInput.onchange=()=>{const f=fileInput.files?.[0];if(!f){go.disabled=true;return;}originalFile=f;outBlob=null;go.disabled=false;dl.disabled=true;bar.style.width="0%";msg.textContent="Ready to compress.";sizes.textContent=`Original: ${bytes(f.size)}`;origInfo.textContent=`${f.type} • ${bytes(f.size)}`;origImg.src=URL.createObjectURL(f);origImg.classList.remove("hidden");newImg.classList.add("hidden");newInfo.textContent="—"};go.onclick=async()=>{if(!originalFile)return;msg.innerHTML='<span class="loading"><span class="spinner"></span> Inacompress image...</span>';bar.style.width="18%";const quality=Math.max(.1,Math.min(.95,(parseInt(q.value||"75",10)/100))),maxW=Math.max(200,Math.min(4000,parseInt(w.value||"1600",10)));const img=new Image();img.src=URL.createObjectURL(originalFile);await new Promise((res,rej)=>{img.onload=res;img.onerror=rej});bar.style.width="45%";const scale=Math.min(1,maxW/img.width),cw=Math.round(img.width*scale),ch=Math.round(img.height*scale);const canvas=document.createElement("canvas");canvas.width=cw;canvas.height=ch;canvas.getContext("2d").drawImage(img,0,0,cw,ch);outBlob=await new Promise(resolve=>canvas.toBlob(resolve,"image/webp",quality)) || await new Promise(resolve=>canvas.toBlob(resolve,"image/jpeg",quality));bar.style.width="100%";newImg.src=URL.createObjectURL(outBlob);newImg.classList.remove("hidden");newInfo.textContent=`${outBlob.type} • ${bytes(outBlob.size)} • ${cw}x${ch}`;sizes.textContent=`Original: ${bytes(originalFile.size)} → Output: ${bytes(outBlob.size)}`;msg.textContent="✅ Compression complete.";dl.disabled=false;toast("✅ Done")};dl.onclick=()=>{if(!outBlob)return;const a=document.createElement("a");a.href=URL.createObjectURL(outBlob);a.download=`compressed.${outBlob.type.includes("webp")?"webp":"jpg"}`;document.body.appendChild(a);a.click();a.remove()};clr.onclick=()=>{fileInput.value="";originalFile=null;outBlob=null;go.disabled=true;dl.disabled=true;bar.style.width="0%";msg.textContent="Ready.";sizes.textContent="";origInfo.textContent="—";newInfo.textContent="—";origImg.classList.add("hidden");newImg.classList.add("hidden")};</script></body></html>
