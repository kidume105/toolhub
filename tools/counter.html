<!doctype html><html lang="sw"><head>
  <meta charset="utf-8"/>

  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content="Count words na characters instantly."/>

<link rel="stylesheet" href="/assets/app.css"/></head><body>
<div class="container"><div id="navMount"></div>
<section class="page">
<div class="breadcrumb"><a href="/index.html">Tools</a> / <span>Word & Character Counter</span></div>
<h1 style="margin:10px 0 6px">Word & Character Counter</h1>
<p class="sub">Count words na characters instantly.</p>
<label class="label">Text</label><textarea id="t" rows="9" placeholder="Bandika hapa..."></textarea>
<div class="row2" style="margin-top:12px"><div class="panel"><div class="small">Words</div><div id="words" style="font-size:1.8rem;font-weight:900">0</div></div><div class="panel"><div class="small">Characters</div><div id="chars" style="font-size:1.8rem;font-weight:900">0</div></div></div>
<div class="btns"><button id="copy" class="secondary" disabled>Copy text</button><button id="clr" class="ghost">Clear</button></div>
</section><div id="footerMount"></div></div>
<div id="toast" class="toast"></div>
<script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>
const t=document.getElementById('t'),w=document.getElementById('words'),c=document.getElementById('chars'),copy=document.getElementById('copy');
function count(){const s=t.value||''; c.textContent=s.length; w.textContent=s.trim()?s.trim().split(/\s+/).length:0; copy.disabled=!s.trim();}
t.addEventListener('input',count); document.getElementById('clr').onclick=()=>{t.value='';count();}; copy.onclick=()=>copyText(t.value); count();
</script>
</body></html>
