<link rel="stylesheet" href="/assets/app.css"/></head><body><div class="container"><div id="navMount"></div><section class="page"><div class="breadcrumb"><a href="/index.html">Home</a><span>/</span><span>Text Case Converter</span></div><h1>Text Case Converter</h1><p class="sub">Convert text to upper, lower, title case na capitalize.</p><label class="label">Input</label><textarea id="in" rows="7" placeholder="Andika au bandika text..."></textarea><div class="btns"><button data-act="upper">UPPERCASE</button><button data-act="lower" class="secondary">lowercase</button><button data-act="title" class="secondary">Title Case</button><button data-act="cap" class="secondary">Capitalize</button><button id="copy" class="ghost">Copy output</button></div><div class="panel"><label class="label">Output</label><textarea id="out" rows="7" readonly></textarea></div></section><div id="footerMount"></div></div><div id="toast" class="toast"></div><script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>const input=document.getElementById("in"),out=document.getElementById("out");function titleCase(s){return s.toLowerCase().replace(/\w+/g,w=>w[0].toUpperCase()+w.slice(1));}function capitalize(s){return s.toLowerCase().replace(/([a-z])/g,m=>m.toUpperCase());}document.addEventListener("click",(e)=>{const act=e.target.dataset.act;if(!act)return;const s=input.value||"";if(act==="upper")out.value=s.toUpperCase();if(act==="lower")out.value=s.toLowerCase();if(act==="title")out.value=titleCase(s);if(act==="cap")out.value=capitalize(s);});document.getElementById("copy").onclick=()=>copyText(out.value);</script></body></html>
