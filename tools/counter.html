<link rel="stylesheet" href="/assets/app.css"/></head><body><div class="container"><div id="navMount"></div><section class="page"><div class="breadcrumb"><a href="/index.html">Home</a><span>/</span><span>Word Counter</span></div><h1>Word Counter</h1><p class="sub">Count words, characters na copy text kwa haraka.</p><label class="label">Text</label><textarea id="t" rows="9" placeholder="Bandika text hapa..."></textarea><div class="row3" style="margin-top:14px;"><div class="panel"><div class="small">Words</div><div id="words" style="font-size:1.8rem;font-weight:900">0</div></div><div class="panel"><div class="small">Characters</div><div id="chars" style="font-size:1.8rem;font-weight:900">0</div></div><div class="panel"><div class="small">Characters (no spaces)</div><div id="chars2" style="font-size:1.8rem;font-weight:900">0</div></div></div><div class="btns"><button id="copy" class="secondary" disabled>Copy text</button><button id="clr" class="ghost">Clear</button></div></section><div id="footerMount"></div></div><div id="toast" class="toast"></div><script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>const t=document.getElementById("t"),words=document.getElementById("words"),chars=document.getElementById("chars"),chars2=document.getElementById("chars2"),copyBtn=document.getElementById("copy");function count(){const s=t.value||"";words.textContent=s.trim()?s.trim().split(/\s+/).length:0;chars.textContent=s.length;chars2.textContent=s.replace(/\s/g,"").length;copyBtn.disabled=!s.trim();}t.addEventListener("input",count);count();document.getElementById("clr").onclick=()=>{t.value="";count();};copyBtn.onclick=()=>copyText(t.value);</script></body></html>
