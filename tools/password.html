<!doctype html>
<html lang="sw">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <main class="card">
    <div class="topbar">
      <a class="link" href="../index.html">← Home</a>
      <span class="small">Password Generator</span>
    </div>

    <p class="sub">Tengeneza password strong kisha copy.</p>

    <div class="row">
      <div>
        <label class="label">Length</label>
        <input id="len" type="number" min="6" max="64" value="14" />
      </div>
      <div>
        <label class="label">Options</label>
        <div class="panel">
          <label class="small"><input type="checkbox" id="up" checked> Uppercase</label><br/>
          <label class="small"><input type="checkbox" id="num" checked> Numbers</label><br/>
          <label class="small"><input type="checkbox" id="sym" checked> Symbols</label>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button id="gen">Generate</button>
      <button id="copy" class="secondary" disabled>Copy</button>
    </div>

    <div class="panel">
      <div class="label">Result</div>
      <input id="out" readonly placeholder="Password itaonekana hapa..." />
      <p id="msg" class="hint"></p>
    </div>
  </main>

  <script>
    const len=document.getElementById("len");
    const up=document.getElementById("up");
    const num=document.getElementById("num");
    const sym=document.getElementById("sym");
    const out=document.getElementById("out");
    const msg=document.getElementById("msg");
    const btnGen=document.getElementById("gen");
    const btnCopy=document.getElementById("copy");

    function randChar(s){ return s[Math.floor(Math.random()*s.length)]; }
    function gen(){
      const L=Math.max(6, Math.min(64, parseInt(len.value||"14",10)));
      let chars="abcdefghijklmnopqrstuvwxyz";
      if(up.checked) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if(num.checked) chars += "0123456789";
      if(sym.checked) chars += "!@#$%^&*()_+-=[]{};:,.?";

      if(chars.length===0){ msg.textContent="⚠️ Chagua angalau option moja."; out.value=""; btnCopy.disabled=true; return; }

      let p="";
      for(let i=0;i<L;i++) p += randChar(chars);
      out.value=p;
      msg.textContent="✅ Imetengenezwa.";
      btnCopy.disabled=false;
    }

    async function copy(){
      try{ await navigator.clipboard.writeText(out.value); msg.textContent="✅ Copied!"; }
      catch{ msg.textContent="⚠️ Imeshindikana ku-copy (jaribu manually)."; }
    }

    btnGen.addEventListener("click", gen);
    btnCopy.addEventListener("click", copy);
  </script>
</body>
</html>
