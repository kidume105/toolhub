<!doctype html><html lang="sw"><head>
  <meta charset="utf-8"/>

  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <meta name="theme-color" content="#08111f"/>

<link rel="stylesheet" href="/assets/app.css"/></head><body>
<div class="container"><div id="navMount"></div>
<section class="page">
<div class="breadcrumb"><a href="/index.html">Tools</a> / <span>Audio Converter</span></div>
<h1 style="margin:10px 0 6px">Audio Converter</h1>
<p class="sub">Convert audio/video → MP3, M4A, au WAV kwa bitrate tofauti.</p>
<div class="panel"><p class="note"><b>Note:</b> Hii tool inatumia FFmpeg WebAssembly ndani ya browser. Mara ya kwanza inaweza kuchelewa ku-load. Kwa devices zenye RAM ndogo, tumia files ndogo au settings za low quality.</p></div><label class="label">Choose audio/video</label><input id="file" type="file" accept="audio/*,video/*"/>
<div class="row2"><div><label class="label">Output format</label><select id="format"><option value="mp3" selected>MP3</option><option value="m4a">M4A</option><option value="wav">WAV</option></select></div>
<div><label class="label">Bitrate</label><select id="br"><option>96k</option><option selected>128k</option><option>192k</option><option>256k</option></select></div></div>
<div class="btns"><button id="load">Load engine</button><button id="run" class="secondary" disabled>Convert</button><button id="download" class="ghost" disabled>Download</button></div>
<div class="panel"><div class="progress"><div id="bar"></div></div><p id="status" class="note" style="margin-top:10px">Ready.</p><p id="sizes" class="small"></p></div>
<audio id="preview" class="media-preview" controls></audio>
</section><div id="footerMount"></div></div>
<div id="toast" class="toast"></div>
<script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script><script>
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log:true, corePath:'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js' });
let loaded=false,outBlob=null;
const file=document.getElementById('file'), loadBtn=document.getElementById('load'), runBtn=document.getElementById('run'), dlBtn=document.getElementById('download'), status=document.getElementById('status'), bar=document.getElementById('bar'), sizes=document.getElementById('sizes'), preview=document.getElementById('preview'), format=document.getElementById('format'), br=document.getElementById('br');
const bytes=n=>n<1024?n+' B':n<1048576?(n/1024).toFixed(1)+' KB':(n/1048576).toFixed(2)+' MB'; const setP=r=>bar.style.width=Math.round(Math.max(0,Math.min(1,r))*100)+'%';
loadBtn.onclick=async()=>{if(loaded) return toast('✅ Engine loaded'); status.textContent='Loading engine...'; setP(.12); ffmpeg.setProgress(({ratio})=>setP(ratio)); try{await ffmpeg.load(); loaded=true; setP(1); status.textContent='✅ Engine loaded'; runBtn.disabled=!file.files?.[0];}catch(e){status.textContent='⚠️ Load failed'; setP(0);}};
file.onchange=()=>{runBtn.disabled=!(loaded&&file.files?.[0]); dlBtn.disabled=true; preview.style.display='none'; outBlob=null; sizes.textContent=file.files?.[0]?`Original: ${bytes(file.files[0].size)}`:'';};
runBtn.onclick=async()=>{const f=file.files?.[0]; if(!f) return; status.textContent='Converting...'; outBlob=null; dlBtn.disabled=true; preview.style.display='none'; setP(0); const inExt=(f.name.split('.').pop()||'mp4').toLowerCase(), input='input.'+inExt, output='audio.'+format.value; ffmpeg.FS('writeFile',input,await fetchFile(f)); const args=['-i',input,'-vn']; if(format.value==='mp3') args.push('-codec:a','libmp3lame','-b:a',br.value,output); else if(format.value==='m4a') args.push('-codec:a','aac','-b:a',br.value,output); else args.push('-codec:a','pcm_s16le',output);
try{ await ffmpeg.run(...args); const data=ffmpeg.FS('readFile',output); const mime=format.value==='mp3'?'audio/mpeg':(format.value==='m4a'?'audio/mp4':'audio/wav'); outBlob=new Blob([data.buffer],{type:mime}); sizes.textContent=`Original: ${bytes(f.size)} → Output: ${bytes(outBlob.size)}`; status.textContent='✅ Done'; dlBtn.disabled=false; preview.src=URL.createObjectURL(outBlob); preview.style.display='block'; try{ffmpeg.FS('unlink',input); ffmpeg.FS('unlink',output);}catch(e){} }catch(e){status.textContent='⚠️ Conversion failed. Jaribu file ndogo.';} finally{setP(1);}
};
dlBtn.onclick=()=>{if(!outBlob) return; const a=document.createElement('a'); a.href=URL.createObjectURL(outBlob); a.download='audio.'+format.value; a.click();};
</script>
</body></html>
