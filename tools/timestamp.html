<link rel="stylesheet" href="/assets/app.css"/></head><body><div class="container"><div id="navMount"></div><section class="page"><div class="breadcrumb"><a href="/index.html">Home</a><span>/</span><span>Timestamp Converter</span></div><h1>Timestamp Converter</h1><p class="sub">Convert Unix seconds kwenda date na kurudi.</p><div class="row2"><div class="panel"><label class="label">Unix Timestamp (seconds)</label><input id="unix" placeholder="1710000000"/><div class="btns"><button id="toDate">To Date</button><button id="now1" class="secondary">Now</button></div></div><div class="panel"><label class="label">Date Time</label><input id="date" placeholder="YYYY-MM-DD HH:mm:ss"/><div class="btns"><button id="toUnix">To Unix</button><button id="now2" class="secondary">Now</button></div></div></div><p id="msg" class="note" style="margin-top:12px;"></p></section><div id="footerMount"></div></div><div id="toast" class="toast"></div><script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>const unix=document.getElementById("unix"),date=document.getElementById("date"),msg=document.getElementById("msg");const pad=n=>String(n).padStart(2,"0"),fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;function setNow(){const d=new Date();unix.value=Math.floor(d.getTime()/1000);date.value=fmt(d);}document.getElementById("toDate").onclick=()=>{const s=parseInt((unix.value||"").trim(),10);if(Number.isNaN(s))return msg.textContent="⚠️ Invalid unix";date.value=fmt(new Date(s*1000));msg.textContent="✅ Converted"};document.getElementById("toUnix").onclick=()=>{const d=new Date((date.value||"").trim().replace(" ","T"));if(isNaN(d.getTime()))return msg.textContent="⚠️ Invalid date";unix.value=Math.floor(d.getTime()/1000);msg.textContent="✅ Converted"};document.getElementById("now1").onclick=()=>{setNow();msg.textContent="✅ Now"};document.getElementById("now2").onclick=()=>{setNow();msg.textContent="✅ Now"};setNow();</script></body></html>
