<link rel="stylesheet" href="/assets/app.css"/></head><body><div class="container"><div id="navMount"></div><section class="page"><div class="breadcrumb"><a href="/index.html">Home</a><span>/</span><span>YouTube Thumbnail Downloader</span></div><h1>YouTube Thumbnail Downloader</h1><p class="sub">Pata maxres, hq na mq thumbnails kwa YouTube link.</p><label class="label">YouTube URL</label><input id="url" placeholder="https://www.youtube.com/watch?v=VIDEO_ID"/><div class="btns"><button id="go">Get thumbnails</button><button id="clr" class="ghost">Clear</button></div><p id="msg" class="note"></p><div id="out" class="panel hidden"><h3 style="margin-top:0;">Results</h3><table class="table" id="tbl"><thead><tr><th>Type</th><th>Preview</th><th>Action</th></tr></thead><tbody></tbody></table></div></section><div id="footerMount"></div></div><div id="toast" class="toast"></div><script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>const url=document.getElementById("url"),msg=document.getElementById("msg"),out=document.getElementById("out"),tbody=document.querySelector("#tbl tbody");function extractId(u){try{const x=new URL(u);if(x.hostname.includes("youtu.be"))return x.pathname.replace("/","");if(x.searchParams.get("v"))return x.searchParams.get("v");const m=x.pathname.match(/\/shorts\/([^\/\?]+)/);return m?m[1]:null}catch{return /^[a-zA-Z0-9_-]{6,}$/.test(u)?u:null}}const types=[["maxresdefault","Max (HD)"],["sddefault","SD"],["hqdefault","HQ"],["mqdefault","MQ"],["default","Default"]];document.getElementById("go").onclick=()=>{const id=extractId((url.value||"").trim());if(!id){msg.textContent="⚠️ Invalid YouTube URL";out.classList.add("hidden");return;}msg.innerHTML='<span class="loading"><span class="spinner"></span> Inatafuta thumbnails...</span>';setTimeout(()=>{tbody.innerHTML=types.map(([file,label])=>{const img=`https://img.youtube.com/vi/${id}/${file}.jpg`;return `<tr><td>${label}</td><td><img src="${img}" style="max-width:220px;border-radius:14px;border:1px solid rgba(255,255,255,.1)"/></td><td><a class="btn secondary" href="${img}" target="_blank" rel="noopener">Open / Download</a></td></tr>`}).join("");msg.textContent="✅ Thumbnails ready";out.classList.remove("hidden")},350)};document.getElementById("clr").onclick=()=>{url.value="";msg.textContent="";out.classList.add("hidden");tbody.innerHTML=""};</script></body></html>
