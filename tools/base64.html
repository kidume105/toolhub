<!doctype html>
<html lang="sw">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Base64 Encode/Decode</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <main class="card">
    <div class="topbar">
      <a class="link" href="../index.html">← Home</a>
      <span class="small">Base64 Encode/Decode</span>
    </div>

    <p class="sub">Encode/Decode text (UTF-8 supported).</p>

    <div class="row">
      <div>
        <label class="label">Input</label>
        <textarea id="in" rows="10" placeholder="Text..."></textarea>
      </div>
      <div>
        <label class="label">Output</label>
        <textarea id="out" rows="10" readonly></textarea>
      </div>
    </div>

    <div class="buttons">
      <button id="enc">Encode</button>
      <button id="dec" class="secondary">Decode</button>
      <button id="copy" class="ghost">Copy output</button>
      <button id="clr" class="ghost">Clear</button>
    </div>

    <p id="msg" class="hint"></p>

    <script>
      const input=document.getElementById("in");
      const out=document.getElementById("out");
      const msg=document.getElementById("msg");

      const utf8ToB64 = (str) => btoa(unescape(encodeURIComponent(str)));
      const b64ToUtf8 = (b64) => decodeURIComponent(escape(atob(b64)));

      document.getElementById("enc").addEventListener("click", ()=>{
        try{ out.value = utf8ToB64(input.value||""); msg.textContent="✅ Encoded."; }
        catch(e){ msg.textContent="⚠️ Encode error."; }
      });

      document.getElementById("dec").addEventListener("click", ()=>{
        try{ out.value = b64ToUtf8((input.value||"").trim()); msg.textContent="✅ Decoded."; }
        catch(e){ msg.textContent="⚠️ Decode error (akikisha Base64 ni sahihi)."; }
      });

      document.getElementById("copy").addEventListener("click", async ()=>{
        try{ await navigator.clipboard.writeText(out.value); msg.textContent="✅ Copied!"; }
        catch{ msg.textContent="⚠️ Copy failed."; }
      });

      document.getElementById("clr").addEventListener("click", ()=>{
        input.value=""; out.value=""; msg.textContent="";
      });
    </script>
  </main>
</body>
</html>
