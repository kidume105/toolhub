<!doctype html>
<html lang="sw">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Image Compressor</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <main class="card">
    <div class="topbar">
      <a class="link" href="../index.html">← Home</a>
      <span class="small">Image Compressor</span>
    </div>

    <p class="sub">Compress JPG/PNG client-side (hakuna upload server).</p>

    <label class="label">Chagua image</label>
    <input id="file" type="file" accept="image/*" />

    <div class="row">
      <div>
        <label class="label">Quality (JPG/WebP)</label>
        <input id="q" type="number" min="10" max="95" value="75" />
      </div>
      <div>
        <label class="label">Max width (px)</label>
        <input id="w" type="number" min="200" max="4000" value="1600" />
      </div>
    </div>

    <div class="buttons">
      <button id="go" disabled>Compress</button>
      <button id="dl" class="secondary" disabled>Download</button>
      <button id="clr" class="ghost">Clear</button>
    </div>

    <div class="row" style="margin-top:14px;">
      <div class="panel">
        <div class="label">Original</div>
        <div id="origInfo" class="small">—</div>
        <img id="origImg" style="max-width:100%;border-radius:12px;border:1px solid rgba(255,255,255,.12);display:none" />
      </div>
      <div class="panel">
        <div class="label">Compressed</div>
        <div id="newInfo" class="small">—</div>
        <img id="newImg" style="max-width:100%;border-radius:12px;border:1px solid rgba(255,255,255,.12);display:none" />
      </div>
    </div>

    <p id="msg" class="hint"></p>

    <script>
      const fileInput=document.getElementById("file");
      const q=document.getElementById("q");
      const w=document.getElementById("w");
      const go=document.getElementById("go");
      const dl=document.getElementById("dl");
      const clr=document.getElementById("clr");
      const msg=document.getElementById("msg");

      const origImg=document.getElementById("origImg");
      const newImg=document.getElementById("newImg");
      const origInfo=document.getElementById("origInfo");
      const newInfo=document.getElementById("newInfo");

      let originalFile=null;
      let outBlob=null;

      function bytes(n){
        if(n<1024) return n+" B";
        if(n<1024*1024) return (n/1024).toFixed(1)+" KB";
        return (n/1024/1024).toFixed(2)+" MB";
      }

      fileInput.addEventListener("change", ()=>{
        const f=fileInput.files?.[0];
        if(!f){ originalFile=null; go.disabled=true; dl.disabled=true; return; }
        originalFile=f;
        outBlob=null;
        go.disabled=false;
        dl.disabled=true;
        msg.textContent="";
        origInfo.textContent = `${f.type || "image"} • ${bytes(f.size)}`;
        const url=URL.createObjectURL(f);
        origImg.src=url;
        origImg.style.display="block";
        newImg.style.display="none";
        newInfo.textContent="—";
      });

      async function compress(){
        if(!originalFile) return;

        const quality=Math.max(0.1, Math.min(0.95, (parseInt(q.value||"75",10)/100)));
        const maxW=Math.max(200, Math.min(4000, parseInt(w.value||"1600",10)));

        const img = new Image();
        img.src = URL.createObjectURL(originalFile);
        await new Promise((res, rej)=>{ img.onload=res; img.onerror=rej; });

        const scale = Math.min(1, maxW / img.width);
        const cw = Math.round(img.width * scale);
        const ch = Math.round(img.height * scale);

        const canvas = document.createElement("canvas");
        canvas.width=cw; canvas.height=ch;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, cw, ch);

        const preferWebp = true;
        const mime = preferWebp ? "image/webp" : "image/jpeg";

        outBlob = await new Promise((resolve)=> canvas.toBlob(resolve, mime, quality));
        if(!outBlob){
          outBlob = await new Promise((resolve)=> canvas.toBlob(resolve, "image/jpeg", quality));
        }

        const outUrl = URL.createObjectURL(outBlob);
        newImg.src=outUrl;
        newImg.style.display="block";
        newInfo.textContent = `${outBlob.type} • ${bytes(outBlob.size)} • ${cw}x${ch}`;

        msg.textContent="✅ Compressed. Bonyeza Download.";
        dl.disabled=false;
      }

      go.addEventListener("click", ()=>{ msg.textContent="Inacompress..."; compress().catch(()=>msg.textContent="⚠️ Compression error."); });

      dl.addEventListener("click", ()=>{
        if(!outBlob) return;
        const a=document.createElement("a");
        const ext = (outBlob.type.includes("webp") ? "webp" : "jpg");
        a.href=URL.createObjectURL(outBlob);
        a.download=`compressed.${ext}`;
        document.body.appendChild(a); a.click(); a.remove();
      });

      clr.addEventListener("click", ()=>{
        fileInput.value="";
        originalFile=null; outBlob=null;
        go.disabled=true; dl.disabled=true;
        origImg.style.display="none"; newImg.style.display="none";
        origInfo.textContent="—"; newInfo.textContent="—";
        msg.textContent="";
      });
    </script>
  </main>
</body>
</html>
