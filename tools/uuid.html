<!doctype html><html lang="sw"><head>
  <meta charset="utf-8"/>

  <meta name="viewport" content="width=device-width,initial-scale=1"/>

<link rel="stylesheet" href="/assets/app.css"/></head><body>
<div class="container"><div id="navMount"></div>
<section class="page">
<div class="breadcrumb"><a href="/index.html">Tools</a> / <span>UUID Generator</span></div>
<h1 style="margin:10px 0 6px">UUID Generator</h1>
<p class="sub">Generate UUID v4 nyingi kwa click moja.</p>
<label class="label">How many?</label><input id="n" type="number" min="1" max="50" value="5"/>
<div class="btns"><button id="gen">Generate</button><button id="copy" class="secondary" disabled>Copy all</button><button id="clr" class="ghost">Clear</button></div>
<div class="panel"><textarea id="out" rows="10" readonly></textarea></div>
</section><div id="footerMount"></div></div>
<div id="toast" class="toast"></div>
<script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>
const n=document.getElementById('n'),o=document.getElementById('out'),copy=document.getElementById('copy');
function uuidv4(){if(crypto?.randomUUID) return crypto.randomUUID(); return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8); return v.toString(16);});}
document.getElementById('gen').onclick=()=>{const k=Math.max(1,Math.min(50,+n.value||5)); o.value=Array.from({length:k},uuidv4).join('\\n'); copy.disabled=false;};
copy.onclick=()=>copyText(o.value); document.getElementById('clr').onclick=()=>{o.value='';copy.disabled=true;};
</script>
</body></html>
