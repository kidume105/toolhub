<!doctype html>
<html lang="sw">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTube Thumbnail Downloader</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <main class="card">
    <div class="topbar">
      <a class="link" href="../index.html">← Home</a>
      <span class="small">YouTube Thumbnail Downloader</span>
    </div>

    <p class="sub">Weka YouTube link, pata thumbnails (maxres, hq, mq...).</p>

    <label class="label">YouTube URL</label>
    <input id="url" placeholder="https://www.youtube.com/watch?v=VIDEO_ID" />

    <div class="buttons">
      <button id="go">Get thumbnails</button>
      <button id="clr" class="ghost">Clear</button>
    </div>

    <p id="msg" class="hint"></p>

    <div id="out" class="panel" style="display:none;">
      <h2 style="margin-top:0;">Results</h2>
      <table class="table" id="tbl">
        <thead><tr><th>Type</th><th>Preview</th><th>Download</th></tr></thead>
        <tbody></tbody>
      </table>
      <p class="small">Tip: maxresdefault inaweza kukosa kwa baadhi ya videos; tumia hqdefault.</p>
    </div>

    <script>
      const url=document.getElementById("url");
      const msg=document.getElementById("msg");
      const out=document.getElementById("out");
      const tbody=document.querySelector("#tbl tbody");

      function extractId(u){
        try{
          const x=new URL(u);
          if(x.hostname.includes("youtu.be")) return x.pathname.replace("/","");
          if(x.searchParams.get("v")) return x.searchParams.get("v");
          const m = x.pathname.match(/\\/shorts\\/([^\\/\\?]+)/);
          if(m) return m[1];
          return null;
        }catch{
          if(/^[a-zA-Z0-9_-]{6,}$/.test(u)) return u;
          return null;
        }
      }

      const types = [
        ["maxresdefault", "Max (HD)"],
        ["sddefault", "SD"],
        ["hqdefault", "HQ"],
        ["mqdefault", "MQ"],
        ["default", "Default"]
      ];

      document.getElementById("go").addEventListener("click", ()=>{
        const id=extractId((url.value||"").trim());
        if(!id){ msg.textContent="⚠️ Weka YouTube link sahihi au video id."; out.style.display="none"; return; }
        msg.textContent="✅ Done.";
        tbody.innerHTML = types.map(([file,label])=>{
          const img=`https://img.youtube.com/vi/${id}/${file}.jpg`;
          return `<tr>
            <td>${label}</td>
            <td><img src="${img}" alt="${label}" style="max-width:220px;border-radius:10px;border:1px solid rgba(255,255,255,.12)"></td>
            <td><a class="link" href="${img}" target="_blank" rel="noopener">Open/Download</a></td>
          </tr>`;
        }).join("");
        out.style.display="block";
      });

      document.getElementById("clr").addEventListener("click", ()=>{
        url.value=""; msg.textContent=""; out.style.display="none"; tbody.innerHTML="";
      });
    </script>
  </main>
</body>
</html>
