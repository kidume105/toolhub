<!doctype html>
<html lang="sw">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>URL Encode/Decode</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <main class="card">
    <div class="topbar">
      <a class="link" href="../index.html">← Home</a>
      <span class="small">URL Encode/Decode</span>
    </div>

    <p class="sub">Encode/Decode query strings haraka.</p>

    <div class="row">
      <div>
        <label class="label">Input</label>
        <textarea id="in" rows="10" placeholder="Mfano: hello world & name=Ali"></textarea>
      </div>
      <div>
        <label class="label">Output</label>
        <textarea id="out" rows="10" readonly></textarea>
      </div>
    </div>

    <div class="buttons">
      <button id="enc">Encode</button>
      <button id="dec" class="secondary">Decode</button>
      <button id="copy" class="ghost">Copy output</button>
      <button id="clr" class="ghost">Clear</button>
    </div>

    <p id="msg" class="hint"></p>

    <script>
      const input=document.getElementById("in");
      const out=document.getElementById("out");
      const msg=document.getElementById("msg");

      document.getElementById("enc").addEventListener("click", ()=>{
        try{ out.value = encodeURIComponent(input.value || ""); msg.textContent="✅ Encoded."; }
        catch{ msg.textContent="⚠️ Encode error."; }
      });

      document.getElementById("dec").addEventListener("click", ()=>{
        try{ out.value = decodeURIComponent((input.value||"").trim()); msg.textContent="✅ Decoded."; }
        catch{ msg.textContent="⚠️ Decode error (string si sahihi)."; }
      });

      document.getElementById("copy").addEventListener("click", async ()=>{
        try{ await navigator.clipboard.writeText(out.value); msg.textContent="✅ Copied!"; }
        catch{ msg.textContent="⚠️ Copy failed."; }
      });

      document.getElementById("clr").addEventListener("click", ()=>{
        input.value=""; out.value=""; msg.textContent="";
      });
    </script>
  </main>
</body>
</html>
