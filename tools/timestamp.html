<link rel="stylesheet" href="/assets/app.css"/></head><body>
<div class="container"><div id="navMount"></div>
<section class="page">
<div class="breadcrumb"><a href="/index.html">Tools</a> / <span>Timestamp Converter</span></div>
<h1 style="margin:10px 0 6px">Timestamp Converter</h1>
<p class="sub">Unix seconds ↔ date time converter.</p>
<div class="row2"><div class="panel"><label class="label">Unix Timestamp (seconds)</label><input id="unix" placeholder="1710000000"/><div class="btns"><button id="toDate">To Date</button><button id="nowUnix" class="secondary">Now</button></div></div><div class="panel"><label class="label">Date/Time</label><input id="date" placeholder="YYYY-MM-DD HH:mm:ss"/><div class="btns"><button id="toUnix">To Unix</button><button id="nowDate" class="secondary">Now</button></div></div></div><p id="msg" class="note" style="margin-top:12px"></p>
</section><div id="footerMount"></div></div>
<div id="toast" class="toast"></div>
<script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>
const u=document.getElementById('unix'),d=document.getElementById('date'),m=document.getElementById('msg'); const pad=n=>String(n).padStart(2,'0'); const fmt=x=>`${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())} ${pad(x.getHours())}:${pad(x.getMinutes())}:${pad(x.getSeconds())}`;
document.getElementById('toDate').onclick=()=>{const s=parseInt((u.value||'').trim(),10); if(Number.isNaN(s)) return m.textContent='⚠️ Invalid unix'; d.value=fmt(new Date(s*1000)); m.textContent='✅ Done';};
document.getElementById('toUnix').onclick=()=>{const iso=(d.value||'').trim().replace(' ','T'); const x=new Date(iso); if(isNaN(x.getTime())) return m.textContent='⚠️ Invalid date'; u.value=Math.floor(x.getTime()/1000); m.textContent='✅ Done';};
function setNow(){const x=new Date(); d.value=fmt(x); u.value=Math.floor(x.getTime()/1000)} document.getElementById('nowUnix').onclick=()=>{setNow();m.textContent='✅ Now';}; document.getElementById('nowDate').onclick=()=>{setNow();m.textContent='✅ Now';}; setNow();
</script>
</body></html>
