<!doctype html><html lang="sw"><head>
  <meta charset="utf-8"/>
  <title>Password Generator — QuickTools</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <meta name="theme-color" content="#08111f"/>
  <link rel="canonical" href="/tools/password.html"/>
  <meta property="og:title" content="Password Generator — QuickTools"/>
  <meta property="og:description" content="Tengeneza password strong na copy kwa click moja."/>

  <meta name="robots" content="index,follow"/>
<link rel="stylesheet" href="/assets/app.css"/></head><body>
<div class="container"><div id="navMount"></div>
<section class="page">
<div class="breadcrumb"><a href="/index.html">Tools</a> / <span>Password Generator</span></div>
<h1 style="margin:10px 0 6px">Password Generator</h1>
<p class="sub">Tengeneza password strong na copy kwa click moja.</p>
<div class="row2"><div><label class="label">Length</label><input id="len" type="number" min="6" max="64" value="14"/></div>
<div><label class="label">Options</label><div class="panel"><label class="note"><input type="checkbox" id="up" checked/> Uppercase</label><br/><label class="note"><input type="checkbox" id="num" checked/> Numbers</label><br/><label class="note"><input type="checkbox" id="sym" checked/> Symbols</label></div></div></div>
<div class="btns"><button id="gen">Generate</button><button id="copy" class="secondary" disabled>Copy</button><button id="clr" class="ghost">Clear</button></div>
<div class="panel"><label class="label">Result</label><input id="out" readonly placeholder="Password itaonekana hapa"/><p id="msg" class="note" style="margin-top:10px"></p></div>
</section><div id="footerMount"></div></div>
<div id="toast" class="toast"></div>
<script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>
const len=document.getElementById('len'),up=document.getElementById('up'),num=document.getElementById('num'),sym=document.getElementById('sym'),out=document.getElementById('out'),msg=document.getElementById('msg'),copy=document.getElementById('copy');
document.getElementById('gen').onclick=()=>{let chars='abcdefghijklmnopqrstuvwxyz'; if(up.checked) chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ'; if(num.checked) chars+='0123456789'; if(sym.checked) chars+='!@#$%^&*()_+-=[]{};:,.?'; if(!chars){msg.textContent='⚠️ Chagua option'; return;} let p=''; const L=Math.max(6,Math.min(64,+len.value||14)); for(let i=0;i<L;i++) p+=chars[Math.floor(Math.random()*chars.length)]; out.value=p; copy.disabled=false; msg.textContent='✅ Generated';};
copy.onclick=()=>copyText(out.value); document.getElementById('clr').onclick=()=>{out.value='';msg.textContent='';copy.disabled=true;};
</script>
</body></html>
