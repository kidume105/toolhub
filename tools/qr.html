<link rel="stylesheet" href="/assets/app.css"/></head><body><div class="container"><div id="navMount"></div><section class="page"><div class="breadcrumb"><a href="/index.html">Home</a><span>/</span><span>QR Code Generator</span></div><h1>QR Code Generator</h1><p class="sub">Generate QR code kwa URL au text na download PNG.</p><div class="row2"><div><label class="label">Link / Text</label><textarea id="text" rows="4" placeholder="Mfano: https://example.com"></textarea><div class="row2"><div><label class="label">Size</label><select id="size"><option>220</option><option selected>300</option><option>420</option></select></div><div><label class="label">Error correction</label><select id="ec"><option>L</option><option selected>M</option><option>Q</option><option>H</option></select></div></div><div class="btns"><button id="gen">Generate</button><button id="dl" class="secondary" disabled>Download PNG</button><button id="clr" class="ghost">Clear</button></div><div class="panel"><div class="progress"><div id="bar"></div></div><p id="msg" class="note" style="margin-top:10px;">Weka text au URL.</p></div></div><div class="panel"><div class="qrbox" id="qrcode"></div></div></div></section><div id="footerMount"></div></div><div id="toast" class="toast"></div><script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script><script>let qr=null;const text=document.getElementById("text"),wrap=document.getElementById("qrcode"),msg=document.getElementById("msg"),gen=document.getElementById("gen"),dl=document.getElementById("dl"),clr=document.getElementById("clr"),size=document.getElementById("size"),ec=document.getElementById("ec"),bar=document.getElementById("bar");function clearQR(){wrap.innerHTML="";qr=null;dl.disabled=true;bar.style.width="0%";}gen.onclick=()=>{const val=(text.value||"").trim();if(!val){msg.textContent="⚠️ Weka text kwanza.";return;}clearQR();msg.innerHTML='<span class="loading"><span class="spinner"></span> Inatengeneza QR...</span>';bar.style.width="35%";qr=new QRCode(wrap,{text:val,width:parseInt(size.value,10),height:parseInt(size.value,10),correctLevel:QRCode.CorrectLevel[ec.value]});setTimeout(()=>{bar.style.width="100%";msg.textContent="✅ QR iko tayari.";dl.disabled=false;},120);};dl.onclick=()=>{const img=wrap.querySelector("img"),canvas=wrap.querySelector("canvas"),url=img?.src||canvas?.toDataURL("image/png");if(!url)return;const a=document.createElement("a");a.href=url;a.download="qrcode.png";document.body.appendChild(a);a.click();a.remove();};clr.onclick=()=>{text.value="";msg.textContent="Weka text au URL.";clearQR();};</script></body></html>
