<link rel="stylesheet" href="/assets/app.css"/></head><body><div class="container"><div id="navMount"></div><section class="page"><div class="breadcrumb"><a href="/index.html">Home</a><span>/</span><span>Password Generator</span></div><h1>Password Generator</h1><p class="sub">Generate password strong yenye options za uppercase, numbers na symbols.</p><div class="row2"><div class="panel"><label class="label">Length</label><input id="len" type="number" min="6" max="64" value="14"/><label class="label">Include</label><label class="small"><input type="checkbox" id="up" checked/> Uppercase</label><br/><label class="small"><input type="checkbox" id="num" checked/> Numbers</label><br/><label class="small"><input type="checkbox" id="sym" checked/> Symbols</label><div class="btns"><button id="gen">Generate</button><button id="copy" class="secondary" disabled>Copy</button><button id="clr" class="ghost">Clear</button></div></div><div class="panel"><label class="label">Result</label><input id="out" readonly placeholder="Password itaonekana hapa"/><p id="msg" class="note" style="margin-top:10px;">Chagua options zako kisha bonyeza Generate.</p></div></div></section><div id="footerMount"></div></div><div id="toast" class="toast"></div><script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>const len=document.getElementById("len"),up=document.getElementById("up"),num=document.getElementById("num"),sym=document.getElementById("sym"),out=document.getElementById("out"),msg=document.getElementById("msg"),copyBtn=document.getElementById("copy");document.getElementById("gen").onclick=()=>{let chars="abcdefghijklmnopqrstuvwxyz";if(up.checked)chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";if(num.checked)chars+="0123456789";if(sym.checked)chars+="!@#$%^&*()_+-=[]{};:,.?";if(!chars){msg.textContent="⚠️ Chagua option angalau moja.";return;}let p="";const L=Math.max(6,Math.min(64,parseInt(len.value||14,10)));for(let i=0;i<L;i++)p+=chars[Math.floor(Math.random()*chars.length)];out.value=p;copyBtn.disabled=false;msg.textContent="✅ Password ready.";};copyBtn.onclick=()=>copyText(out.value);document.getElementById("clr").onclick=()=>{out.value="";msg.textContent="Imeclear.";copyBtn.disabled=true;};</script></body></html>
