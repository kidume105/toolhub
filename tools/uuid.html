<link rel="stylesheet" href="/assets/app.css"/></head><body><div class="container"><div id="navMount"></div><section class="page"><div class="breadcrumb"><a href="/index.html">Home</a><span>/</span><span>UUID Generator</span></div><h1>UUID Generator</h1><p class="sub">Generate UUID v4 nyingi kwa matumizi ya development.</p><div class="row2"><div class="panel"><label class="label">How many UUIDs?</label><input id="n" type="number" min="1" max="50" value="5"/><div class="btns"><button id="gen">Generate</button><button id="copy" class="secondary" disabled>Copy all</button><button id="clr" class="ghost">Clear</button></div></div><div class="panel"><label class="label">Output</label><textarea id="out" rows="10" readonly></textarea></div></div></section><div id="footerMount"></div></div><div id="toast" class="toast"></div><script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>const n=document.getElementById("n"),out=document.getElementById("out"),copyBtn=document.getElementById("copy");function uuidv4(){return crypto?.randomUUID?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);});}document.getElementById("gen").onclick=()=>{let arr=[];for(let i=0;i<Math.max(1,Math.min(50,parseInt(n.value||5,10)));i++)arr.push(uuidv4());out.value=arr.join("
");copyBtn.disabled=false;toast("✅ Generated");};copyBtn.onclick=()=>copyText(out.value);document.getElementById("clr").onclick=()=>{out.value="";copyBtn.disabled=true;};</script></body></html>
