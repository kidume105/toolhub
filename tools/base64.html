<link rel="stylesheet" href="/assets/app.css"/></head><body><div class="container"><div id="navMount"></div><section class="page"><div class="breadcrumb"><a href="/index.html">Home</a><span>/</span><span>Base64 Encode/Decode</span></div><h1>Base64 Encode/Decode</h1><p class="sub">Encode au decode UTF-8 text kwa urahisi.</p><div class="row2"><div><label class="label">Input</label><textarea id="in" rows="10"></textarea></div><div><label class="label">Output</label><textarea id="out" rows="10" readonly></textarea></div></div><div class="btns"><button id="enc">Encode</button><button id="dec" class="secondary">Decode</button><button id="copy" class="ghost">Copy output</button><button id="clr" class="ghost">Clear</button></div><p id="msg" class="note"></p></section><div id="footerMount"></div></div><div id="toast" class="toast"></div><script src="/assets/layout.js"></script><script src="/assets/app.js"></script><script>const i=document.getElementById("in"),o=document.getElementById("out"),m=document.getElementById("msg");const utf8ToB64=s=>btoa(unescape(encodeURIComponent(s))),b64ToUtf8=b=>decodeURIComponent(escape(atob(b)));document.getElementById("enc").onclick=()=>{try{o.value=utf8ToB64(i.value||"");m.textContent="✅ Encoded"}catch{m.textContent="⚠️ Encode error"}};document.getElementById("dec").onclick=()=>{try{o.value=b64ToUtf8((i.value||"").trim());m.textContent="✅ Decoded"}catch{m.textContent="⚠️ Decode error"}};document.getElementById("copy").onclick=()=>copyText(o.value);document.getElementById("clr").onclick=()=>{i.value="";o.value="";m.textContent=""};</script></body></html>
